{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Vaccination for {{ pet.name }} - PetVet Diary{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title mb-4">Add Vaccination for {{ pet.name }}</h2>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">Add Vaccination</button>
                        <a href="{% url 'pets:pet_detail' pet.pk %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
