{% extends 'base.html' %}

{% block title %}Delete {{ pet.name }} - PetVet Diary{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body text-center">
                <h2 class="card-title text-danger mb-4">Delete Pet</h2>

                <p class="lead">Are you sure you want to delete <strong>{{ pet.name }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'pets:pet_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
